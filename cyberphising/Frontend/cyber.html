<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing & Social Engineering Defense Module</title>
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
        }
        .page-item {
            margin-left: 100px;
            margin-bottom: 20px;
        }
        .button1 {
           
             font-size: 16px;
            background-color: blue;
            color: white;
            padding: 10px 20px;
            margin-top: -30px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-right: 30px;
            float: right;
            text-decoration: none;
        }
        .button1:hover {
            background-color: darkblue;
        }
        .nav1{
            width: 600px;
            background-color: white;
            border-radius: 20px;
            margin: 60px auto;
            padding : 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        textarea{
            margin-bottom: 10px;
            width: 100%;
            height: 120px;
            border-radius: 3px; 
        }
        .input1{
            padding: 10px;
            border-radius: 3px;
            background-color: blue;
            color: white;
            width: 100%;
            height: 40px;
            border: none;
            font-size: x-large;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 16px;
            color: #777;
        }
        .footer1{
            text-align: center;
            margin-top: -20px; 
            font-size: 16px;
            color: #ccc;
        }
        .result{
            margin-top: 20px; 
            padding: 15px;
            border-radius: 10px;
            font-family: Arial, sans-serif;
            animation: fadeIn 0.4s ease-in-out;
        }
        .result h2{
           margin-bottom: 10px;
       }
        .PHISHING { 
            background-color: #ffe5e5; 
            border-left: 6px solid red;
        } 
       .SAFE {
                background-color: #ccffcc;
                border-left: 6px solid green;
            }
            @keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* Tablet Screen */
@media (max-width: 768px){

.nav1{
    width: 90%;
    margin: 40px auto;
    padding: 25px;
}

.page-item{
    margin-left: 0;
    text-align: center;
}

.button1{
    float: none;
    display: block;
    margin: 20px auto;
}

textarea{
    height: 100px;
}

.input1{
    font-size: 18px;
}

}


/* Mobile Screen */
@media (max-width: 480px){

body{
    padding: 10px;
}

.nav1{
    width: 95%;
    padding: 20px;
}

.page-item{
    font-size: 20px;
    text-align: center;
    margin-left: 0;
}

.footer1{
    font-size: 14px;
}

textarea{
    height: 90px;
}

.input1{
    height: 40px;
    font-size: 16px;
}

.result h2{
    font-size: 18px;
}

.result h3{
    font-size: 14px;
}

.button1{
    width: 90%;
    text-align: center;
}

.footer{
    font-size: 14px;
}

}
    </style>
</head>
<body>
    <a href="Register.html" id="registerBtn" class="button1">Register</a>
    <nav class="nav1">
        
        <h2 class="page-item">🔐 AI-Based Phishing Detection</h2>
        <div class="footer1">
       Real-Time Threat Analysis | Intelligent Link Detection | Zero-Click Protection
    </div>

    </div>
    <form id="scanForm">
    <textarea id="message" name="message" placeholder="suspicious message verify here...."></textarea>
    <input class="input1" type="submit" value="Scan Message">
    </form></nav>
    
    <nav class="nav1">
        <div id="result"></div>
   
    <div class="footer">
        © 2026 AI Cyber Security Dashboard | Secure. Detect. Protect.
    </div>
   </nav>
   
   <script>
    window.addEventListener("DOMContentLoaded", function() {

    const email = localStorage.getItem("email");
    const registerBtn = document.getElementById("registerBtn");

    if (email) {
        registerBtn.innerText = email;
        registerBtn.href = "#";
    } else {
        registerBtn.innerText = "Register";
        registerBtn.href = "Register.html";
    }
    
    
    const token = localStorage.getItem("token");
    const loginBtn = document.getElementById("loginBtn");

    if (token) {
        loginBtn.style.display = "none";  
    }
});

 document.getElementById("scanForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const message = document.getElementById("message").value;

    const response = await fetch("/scan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
    });

    const data = await response.json();

    const resultDiv = document.getElementById("result");

    resultDiv.className = "result " + data.status;

    resultDiv.innerHTML = `
        <h2> Result :</h2>
        <h3>Status: ${data.status}</h3>
        <h3>Confidence: ${data.confidence}%</h3>
        <h3>Action: ${data.action}</h3>
        <h3>Warning: ${data.warning}</h3>
        
    `;
});

   </script>
</body>
</html>
