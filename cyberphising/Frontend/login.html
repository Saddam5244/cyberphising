<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        html, body, #root{
         width: 100%;
         height: 100%;
         margin: 0;
         padding: 0;
         box-sizing: border-box;
         display: flex;
         justify-content: center;
         align-items: center;
         background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
       }
        .page-item {
justify-content: center;
align-items: center;
margin-left: 120px;
margin-top: 15px;
font-weight: bold;
font-size: x-large;
}
.form1 {
border-radius: 7px;
background-color:white;
width: 25%;
height: 290px;
border: none;
 box-shadow: 8px 8px 24px 0px rgba(66, 68, 90, 1);
}
.name {
font-size: large;
margin-left: 20px;
}
.name1{
    font-size: large;
    margin-left: 55px;
}
.input1 {
font-size: large;
margin-top: 15px;
}
.input2 {
font-size: x-large;
margin-top: 55px;
font-weight: bold;
margin-left: 20px;
width: 90%;
height: 50px;
color: white;
background-color: rgb(71, 71, 224);
border: none;
border-radius: 3px;
}
strong {
margin-left: 200px;
font-size: xx-large;
color: blue;
}

/* Tablet screens */
@media (max-width: 1024px) {

    .form1{
        width: 50%;
        height: auto;
        padding: 20px;
    }

    .page-item{
        margin-left: 0;
        text-align: center;
    }

    .name,
    .name1{
        margin-left: 0;
        display: block;
        margin-top: 10px;
    }

    .input1{
        width: 90%;
        margin-left: 5%;
    }

    .input2{
        width: 90%;
        margin-left: 5%;
    }

}


/* Mobile screens */
@media (max-width: 600px) {

    .form1{
        width: 90%;
        height: auto;
        padding: 20px;
    }

    .page-item{
        font-size: 22px;
        margin-left: 0;
        text-align: center;
    }

    .name,
    .name1{
        margin-left: 0;
        display: block;
        margin-top: 10px;
    }

    .input1{
        width: 100%;
    }

    .input2{
        width: 100%;
        font-size: 18px;
        height: 45px;
        margin-left: 0;
    }

}
    </style>
</head>
<body>
            <form class="form1">
            <h2 class="page-item">
            Login Page
            </h2>
            <label class="name1" for="username">Email :</label>
            <input class="input1" type="email" name="email" id="email" placeholder="email" required>
            <br><br><br>
            <label class="name" for="password">Passwords :</label>
            <input class="input1" type="password" name="password" id="password" placeholder="password" required>
            <input class="input2" type="submit" name="submit" id="submit" required>
            </form>
   <script>
document.querySelector("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (response.ok) {
        alert("Login Successful");
        localStorage.setItem("token", data.token);
        localStorage.setItem("email", email);
        window.location.href = "/Phising.html";
    } else {
        alert(data.message);
    }
});
</script>
</body>
</html>
